{% extends 'base.html' %}
{% block title %}Events - ZimTechHub{% endblock %}
{% block content %}
<div class="max-w-7xl mx-auto px-4 py-8">
    <h1 class="text-3xl font-bold mb-6">Events</h1>
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        {% for event in events %}
        <div class="bg-white dark:bg-gray-800 rounded-xl shadow overflow-hidden hover:shadow-md transition">
            <img src="{{ event.banner.url }}" class="w-full h-48 object-cover">
            <div class="p-6">
                <span class="text-xs font-semibold text-primary uppercase">{{ event.event_type }}</span>
                <h3 class="font-semibold text-lg mt-1"><a href="{% url 'events:detail' event.slug %}" class="hover:text-primary">{{ event.title }}</a></h3>
                <p class="text-gray-500 text-sm mt-2">{{ event.start_date|date:"M d, Y" }} - {{ event.venue }}</p>
            </div>
        </div>
        {% empty %}
        <div class="col-span-full text-center text-gray-500 py-12">No events</div>
        {% endfor %}
    </div>
</div>
{% endblock %}
