<div class="bg-white dark:bg-slate-900 rounded-3xl border border-slate-200 dark:border-slate-800 shadow-sm p-6">

    <!-- Header -->
    <div class="flex items-center justify-between mb-6">
        <div class="flex items-center gap-3">
            <div
                class="w-11 h-11 rounded-2xl bg-blue-100 dark:bg-blue-900/30 flex items-center justify-center">
                <i class="fas fa-lightbulb text-blue-600 dark:text-blue-400 text-lg"></i>
            </div>

            <div>
                <h2 class="text-xl font-bold text-slate-900 dark:text-white">
                    Search Suggestions
                </h2>
                <p class="text-sm text-slate-500 dark:text-slate-400">
                    Popular searches to help you discover content
                </p>
            </div>
        </div>
    </div>

    <!-- Suggestions -->
    <div class="flex flex-wrap gap-3">
        {% for suggestion in suggestions %}

        <a href="?q={{ suggestion }}"
            class="group inline-flex items-center gap-2 px-4 py-2.5 rounded-full
                   bg-slate-100 dark:bg-slate-800
                   border border-slate-200 dark:border-slate-700
                   text-slate-700 dark:text-slate-300
                   hover:bg-blue-600 hover:text-white hover:border-blue-600
                   hover:shadow-lg hover:shadow-blue-500/20
                   transition-all duration-300">

            <i class="fas fa-search text-xs opacity-70 group-hover:opacity-100"></i>

            <span class="font-medium">
                {{ suggestion }}
            </span>

        </a>

        {% empty %}

        <div class="w-full py-10 text-center">
            <div
                class="mx-auto w-14 h-14 rounded-2xl bg-slate-100 dark:bg-slate-800 flex items-center justify-center mb-4">
                <i class="fas fa-search text-slate-400 text-xl"></i>
            </div>

            <p class="text-slate-500 dark:text-slate-400">
                No suggestions available.
            </p>
        </div>

        {% endfor %}
    </div>

</div>
