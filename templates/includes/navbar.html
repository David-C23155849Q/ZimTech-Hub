<nav
    x-data="{ mobile:false }"
    class="sticky top-0 z-50 bg-white/95 dark:bg-slate-900/95 backdrop-blur border-b border-slate-200 dark:border-slate-700">

    <div class="max-w-7xl mx-auto px-6">

        <div class="flex h-16 items-center justify-between">

            <!-- Logo -->
            <a href="{% url 'core:home' %}" class="flex items-center space-x-3">

                <div class="flex h-10 w-10 items-center justify-center rounded-xl bg-blue-600 text-white font-bold shadow-sm">
                    Z
                </div>

                <div class="hidden sm:block">
                    <h1 class="font-bold text-lg text-slate-900 dark:text-white">
                        ZimTechHub
                    </h1>
                    <p class="text-xs text-slate-500">
                        Zimbabwe's Developer Community
                    </p>
                </div>

            </a>

            <!-- Search -->
            <div class="hidden lg:flex flex-1 max-w-xl mx-10">

                <form action="{% url 'core:search' %}" class="w-full">

                    <div class="relative">

                        <svg class="absolute left-4 top-3.5 h-5 w-5 text-slate-400"
                             fill="none"
                             stroke="currentColor"
                             viewBox="0 0 24 24">

                            <path stroke-linecap="round"
                                  stroke-linejoin="round"
                                  stroke-width="2"
                                  d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0"/>

                        </svg>

                        <input
                            type="text"
                            name="q"
                            placeholder="Search developers, projects, products..."
                            class="w-full rounded-xl border border-slate-300 dark:border-slate-600 bg-slate-50 dark:bg-slate-800 py-2.5 pl-11 pr-4 text-sm focus:border-blue-500 focus:outline-none focus:ring-2 focus:ring-blue-500">

                    </div>

                </form>

            </div>

            <!-- Navigation -->
            <div class="hidden md:flex items-center space-x-2">

                <a href="{% url 'products:list' %}"
                   class="rounded-lg px-3 py-2 text-sm font-medium text-slate-600 hover:bg-slate-100 hover:text-blue-600 dark:text-slate-300 dark:hover:bg-slate-800">
                    Marketplace
                </a>

                <a href="{% url 'projects:list' %}"
                   class="rounded-lg px-3 py-2 text-sm font-medium text-slate-600 hover:bg-slate-100 hover:text-blue-600 dark:text-slate-300 dark:hover:bg-slate-800">
                    Projects
                </a>

                <a href="{% url 'jobs:job_list' %}"
                   class="rounded-lg px-3 py-2 text-sm font-medium text-slate-600 hover:bg-slate-100 hover:text-blue-600 dark:text-slate-300 dark:hover:bg-slate-800">
                    Jobs
                </a>

                <a href="{% url 'posts:feed' %}"
                   class="rounded-lg px-3 py-2 text-sm font-medium text-slate-600 hover:bg-slate-100 hover:text-blue-600 dark:text-slate-300 dark:hover:bg-slate-800">
                    Community
                </a>

                {% if user.is_authenticated %}

                <div class="relative ml-3" x-data="{ open:false }">

                    <button
                        @click="open=!open"
                        class="flex items-center space-x-3 rounded-xl border border-slate-200 dark:border-slate-700 px-3 py-2 hover:bg-slate-100 dark:hover:bg-slate-800">

                        <img
                            src="{{ user.profile.avatar.url|default:'/static/images/default-avatar.png' }}"
                            class="h-9 w-9 rounded-full object-cover">

                        <div class="hidden xl:block text-left">

                            <p class="text-sm font-semibold">
                                {{ user.first_name|default:user.username }}
                            </p>

                            <p class="text-xs text-slate-500">
                                Developer
                            </p>

                        </div>

                        <svg class="h-4 w-4 text-slate-500"
                             fill="none"
                             stroke="currentColor"
                             viewBox="0 0 24 24">

                            <path stroke-linecap="round"
                                  stroke-linejoin="round"
                                  stroke-width="2"
                                  d="M19 9l-7 7-7-7"/>

                        </svg>

                    </button>

                    <div
                        x-show="open"
                        @click.away="open=false"
                        x-transition
                        class="absolute right-0 mt-3 w-56 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 shadow-xl overflow-hidden">

                        <a href="{% url 'profiles:detail' user.username %}"
                           class="block px-4 py-3 hover:bg-slate-100 dark:hover:bg-slate-700">
                            My Profile
                        </a>

                        <a href="{% url 'dashboard:index' %}"
                           class="block px-4 py-3 hover:bg-slate-100 dark:hover:bg-slate-700">
                            Dashboard
                        </a>

                        <a href="{% url 'accounts:settings' %}"
                           class="block px-4 py-3 hover:bg-slate-100 dark:hover:bg-slate-700">
                            Settings
                        </a>

                        <div class="border-t border-slate-200 dark:border-slate-700"></div>

                        <a href="{% url 'accounts:logout' %}"
                           class="block px-4 py-3 text-red-600 hover:bg-red-50 dark:hover:bg-red-900/20">
                            Logout
                        </a>

                    </div>

                </div>

                {% else %}

                <div class="flex items-center space-x-3 ml-4">

                    <a href="{% url 'accounts:login' %}"
                       class="font-medium text-slate-600 hover:text-blue-600">
                        Login
                    </a>

                    <a href="{% url 'accounts:signup' %}"
                       class="rounded-xl bg-blue-600 px-5 py-2.5 text-sm font-semibold text-white shadow-sm hover:bg-blue-700">
                        Sign Up
                    </a>

                </div>

                {% endif %}

            </div>

        </div>

    </div>

</nav>
