<div class="bg-white dark:bg-slate-800 rounded-3xl shadow border border-slate-200 dark:border-slate-700 p-6">

    <h3 class="text-xl font-bold mb-5">

        👨‍💻 Developer

    </h3>

    <div class="flex items-center gap-4">

    {% if project.owner.profile.avatar %}

        <img
            src="{{ project.owner.profile.avatar.url }}"
            alt="{{ project.owner.username }}"
            class="w-16 h-16 rounded-full object-cover">

    {% else %}

        <div class="w-16 h-16 rounded-full bg-blue-600 text-white flex items-center justify-center text-xl font-bold">

            {{ project.owner.username|first|upper }}

        </div>

    {% endif %}

    <div>

        <a href="{% url 'profiles:detail' project.owner.username %}"
           class="font-bold text-lg hover:text-blue-600 transition">

            {{ project.owner.profile.headline|default:project.owner.username }}

        </a>

        <p class="text-sm text-slate-500">

            @{{ project.owner.username }}

        </p>

    </div>

</div>

</div>
